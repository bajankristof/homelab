apiVersion: apps/v1
kind: Deployment
metadata:
  name: upsnap
  labels:
    app: upsnap
spec:
  selector:
    matchLabels:
      app: upsnap
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: upsnap
    spec:
      hostNetwork: true
      containers:
      - name: upsnap
        image: seriousm4x/upsnap:5
        imagePullPolicy: {{ .Values.deployment.imagePullPolicy }}
        command:
        - ./upsnap
        - serve
        ports:
        - name: web
          containerPort: {{ .Values.deployment.containerPort }}
          protocol: TCP
        env:
        - name: UPSNAP_HTTP_LISTEN
          value: "0.0.0.0:{{ .Values.deployment.containerPort }}"
        volumeMounts:
        - name: upsnap-data
          mountPath: /app/pb_data
        livenessProbe:
          tcpSocket:
            port: web
          initialDelaySeconds: 10
          periodSeconds: 10
      volumes:
      - name: upsnap-data
        hostPath:
          path: {{ .Values.volumes.data.hostPath }}
          type: DirectoryOrCreate
